<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Shot Archive</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="截图工具栏">
        <div class="toolbar-title">
          <p class="eyebrow">Page Shot Archive</p>
          <h1>网页截图时间档案</h1>
        </div>
        <div class="toolbar-navs">
          <nav class="platform-tabs" role="tablist" aria-label="按平台查看">
            <button
              id="platformTabPc"
              class="platform-tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
              data-platform-tab="pc"
            >
              PC
            </button>
            <button
              id="platformTabMobile"
              class="platform-tab"
              type="button"
              role="tab"
              aria-selected="false"
              data-platform-tab="mobile"
              tabindex="-1"
            >
              手机
            </button>
          </nav>
          <nav class="tabs" role="tablist" aria-label="页面内容">
            <button
              id="tabArchive"
              class="tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="archivePanel"
              data-tab="archive"
            >
              截图存档
            </button>
            <button
              id="tabChanges"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="changesPanel"
              data-tab="changes"
              tabindex="-1"
            >
              变更汇总
            </button>
          </nav>
        </div>
        <div class="actions">
          <button id="refresh" type="button">刷新</button>
        </div>
      </section>

      <section class="workspace">
        <section
          id="archivePanel"
          class="tab-panel is-active"
          role="tabpanel"
          aria-labelledby="tabArchive"
          data-tab-panel="archive"
        >
          <section class="status-grid" aria-label="截图存档状态">
            <div class="stat">
              <span>当前平台</span>
              <strong id="platformState">PC</strong>
            </div>
            <div class="stat">
              <span>归档数量</span>
              <strong id="shotCount">0</strong>
            </div>
            <div class="stat">
              <span>自动截图</span>
              <strong id="scheduleState">按启用计划执行</strong>
            </div>
            <div class="stat">
              <span>浏览器</span>
              <strong id="browserState">检查中</strong>
            </div>
            <div class="stat">
              <span>运行状态</span>
              <strong id="captureState">空闲</strong>
            </div>
          </section>

          <section class="timeline" aria-label="截图历史">
            <div class="timeline-head">
              <div>
                <h2>历史截图</h2>
                <p id="latestShotTime">最近一次截图时间：计算中</p>
              </div>
              <div class="timeline-filters">
                <div class="multi-filter" id="deviceFilter" data-open="false">
                  <button
                    id="deviceFilterButton"
                    class="multi-filter-button"
                    type="button"
                    aria-haspopup="true"
                    aria-expanded="false"
                  >
                    <span id="deviceFilterLabel">全部截图设备</span>
                  </button>
                  <div id="deviceFilterMenu" class="multi-filter-menu" role="group" aria-label="按截图设备过滤"></div>
                </div>
                <div class="date-range-filter" aria-label="按截图日期过滤">
                  <input id="dateStartFilter" type="date" aria-label="开始日期">
                  <span aria-hidden="true">→</span>
                  <input id="dateEndFilter" type="date" aria-label="结束日期">
                  <button id="dateClearFilter" class="icon-button" type="button" aria-label="清除日期筛选" title="清除日期筛选">
                    ×
                  </button>
                </div>
                <select id="urlFilter" aria-label="按 URL 过滤">
                  <option value="">全部 URL</option>
                </select>
              </div>
            </div>
            <p id="archiveStatus" class="timeline-status" hidden aria-live="polite"></p>
            <div id="gallery" class="gallery"></div>
            <p id="empty" class="empty">还没有归档截图。</p>
          </section>
        </section>

        <section
          id="changesPanel"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tabChanges"
          data-tab-panel="changes"
          hidden
        >
          <section class="status-grid changes-status" aria-label="变更汇总状态">
            <div class="stat">
              <span>变更记录</span>
              <strong id="changeCount">0</strong>
            </div>
          </section>

          <section class="changes-panel" aria-label="变更汇总">
            <div class="timeline-head">
              <div>
                <h2>变更汇总</h2>
                <p>按同 URL、设备和页面位置，与上一张图对比</p>
              </div>
              <div class="timeline-filters">
                <div class="multi-filter" id="changesDeviceFilter" data-open="false">
                  <button
                    id="changesDeviceFilterButton"
                    class="multi-filter-button"
                    type="button"
                    aria-haspopup="true"
                    aria-expanded="false"
                  >
                    <span id="changesDeviceFilterLabel">全部截图设备</span>
                  </button>
                  <div id="changesDeviceFilterMenu" class="multi-filter-menu" role="group" aria-label="按变更设备过滤"></div>
                </div>
                <div class="date-range-filter" aria-label="按变更日期过滤">
                  <input id="changesDateStartFilter" type="date" aria-label="开始日期">
                  <span aria-hidden="true">→</span>
                  <input id="changesDateEndFilter" type="date" aria-label="结束日期">
                  <button id="changesDateClearFilter" class="icon-button" type="button" aria-label="清除日期筛选" title="清除日期筛选">
                    ×
                  </button>
                </div>
                <select id="changesUrlFilter" aria-label="按 URL 过滤">
                  <option value="">全部 URL</option>
                </select>
              </div>
            </div>
            <div id="changesList" class="changes-list"></div>
            <nav id="changesPagination" class="changes-pagination" aria-label="变更分页" hidden>
              <button id="changesPrevPage" type="button">上一页</button>
              <span id="changesPaginationStatus" class="changes-pagination-status" aria-live="polite"></span>
              <button id="changesNextPage" type="button">下一页</button>
            </nav>
            <p id="changesEmpty" class="empty">暂无变更记录。</p>
          </section>
        </section>
      </section>
    </main>

    <div id="imagePreview" class="image-preview" hidden aria-hidden="true">
      <div class="image-preview-panel" role="dialog" aria-modal="true" aria-label="图片预览">
        <div class="image-preview-toolbar">
          <div class="image-preview-zoom-controls" aria-label="图片缩放">
            <button id="imagePreviewZoomOut" class="image-preview-tool" type="button" aria-label="缩小图片">-</button>
            <span id="imagePreviewZoomValue" class="image-preview-zoom-value" aria-live="polite">100%</span>
            <button id="imagePreviewZoomIn" class="image-preview-tool" type="button" aria-label="放大图片">+</button>
            <button id="imagePreviewZoomFit" class="image-preview-tool image-preview-fit" type="button">适应窗口</button>
          </div>
          <button id="imagePreviewClose" class="image-preview-close" type="button" aria-label="关闭预览">关闭</button>
          <div id="imagePreviewNavControls" class="image-preview-nav-controls" hidden aria-label="更多截图切换">
            <button id="imagePreviewPrev" class="image-preview-tool" type="button" aria-label="前一张">前一张</button>
            <button id="imagePreviewNext" class="image-preview-tool" type="button" aria-label="后一张">后一张</button>
          </div>
        </div>
        <div id="imagePreviewViewport" class="image-preview-viewport">
          <div class="image-preview-stage">
            <div id="imagePreviewLongView" class="image-preview-long-view" data-mode="single">
              <div id="imagePreviewMainFrame" class="image-preview-main-frame">
                <img id="imagePreviewImage" src="" alt="" draggable="false">
                <div id="imagePreviewDepthMarkers" class="image-preview-depth-markers" aria-hidden="true"></div>
              </div>
              <aside id="imagePreviewScreenRail" class="image-preview-screen-rail" aria-label="屏幕深度刻度"></aside>
            </div>
          </div>
        </div>
        <p id="imagePreviewCaption" class="image-preview-caption"></p>
      </div>
    </div>

    <div id="warningPreview" class="warning-preview" hidden aria-hidden="true">
      <section class="warning-preview-panel" role="dialog" aria-modal="true" aria-labelledby="warningPreviewTitle">
        <div class="warning-preview-head">
          <div>
            <p class="warning-preview-kicker">校验警告</p>
            <h2 id="warningPreviewTitle">更多截图校验警告</h2>
          </div>
          <button id="warningPreviewClose" class="warning-preview-close" type="button" aria-label="关闭警告弹窗">关闭</button>
        </div>
        <ul id="warningPreviewList" class="warning-preview-list"></ul>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
